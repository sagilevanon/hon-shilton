version: '3.8'

services:
  frontend:
    build: 
      context: ./hon-shilton-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

  backend:
    build: 
      context: ./hon-shilton-backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./hon-shilton-backend/server:/app/server
